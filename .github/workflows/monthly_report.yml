name: Monthly Git-Insight Report

on:
  schedule:
    - cron: '0 9 1 * *'  # Run at 9:00 AM on the 1st of every month
  workflow_dispatch:      # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Generate Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Optional
        run: |
          # Replace 'owner/repo' with your target repository
          CATEGORY="month-$(date +'%Y-%m')"
          mkdir -p reports
          python main.py --repo ${{ github.repository }} --days 30 --output "reports/report-$CATEGORY.pdf"
          
      - name: Commit and Push Report
        run: |
          git config --global user.name 'Git-Insight Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add reports/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add monthly report for $(date +'%B %Y')" && git push)
